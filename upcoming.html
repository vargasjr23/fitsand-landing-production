<!DOCTYPE html>

<html lang="en"><head><meta charset="utf-8"/>
<meta content="width=device-width, initial-scale=1.0" name="viewport"/>
<title>Fitsand - Upcoming Collections</title>
<script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
<link href="https://fonts.googleapis.com/css2?family=Albert+Sans:wght@300;400;500;600&amp;family=Fraunces:opsz,wght@9..144,300;400;500;600&amp;family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&amp;display=swap" rel="stylesheet"/>
<script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#ee5f2b",
                        "background-light": "#f8f6f6",
                        "background-dark": "#221510",
                        "surface": "#EFEBE3",
                        "text-dark": "#3B342F",
                        "muted": "#9F8D7F",
                        stone: {
                            50: "#F7F5F0",
                        },
                        clay: {
                            600: "#B47A65",
                        }
                    },
                    fontFamily: {
                        "display": ["Manrope", "sans-serif"],
                        "headline": ["Fraunces", "serif"],
                        "body": ["Albert Sans", "sans-serif"],
                        "nav": ["Albert Sans", "sans-serif"]
                    },
                    borderRadius: {
                        "DEFAULT": "0.5rem",
                        "lg": "1rem",
                        "xl": "1.5rem",
                        "full": "9999px"
                    },
                },
            },
        }
    </script>
<style>
        .font-serif { font-family: 'Fraunces', serif; }
        .font-sans { font-family: 'Albert Sans', sans-serif; }
        /* Custom styles for specific interactions */
        .input-underline {
            transition: border-color 0.3s ease, border-width 0.3s ease;
        }
        .input-underline:focus {
            border-bottom-width: 2px;
            border-color: #3B342F;
            outline: none;
            box-shadow: none;
        }
        .form-submitted .input-group {
            display: none;
        }
        .form-submitted .success-message {
            display: block;
            animation: fadeIn 0.5s ease forwards;
        }
        .success-message {
            display: none;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .submit-btn:active .material-symbols-outlined {
            animation: shootRight 0.4s ease forwards;
        }
        @keyframes shootRight {
            0% { transform: translateX(0); opacity: 1; }
            100% { transform: translateX(10px); opacity: 0; }
        }
    </style></head>
<body class="bg-background-light font-display text-text-dark antialiased min-h-screen flex flex-col overflow-x-hidden">
<!-- TopNavBar Included as this is technically a destination/content section, though specialized -->
<nav class="bg-stone-50/90 dark:bg-stone-950/90 backdrop-blur-md border-b border-stone-200/50 dark:border-stone-800/50 fixed top-0 w-full z-50">
<div class="flex justify-between items-center px-6 py-4 max-w-screen-2xl mx-auto">
<div class="text-2xl font-light tracking-[0.2em] uppercase text-stone-900 dark:text-stone-50 font-body">Fitsand</div>
<div class="hidden md:flex gap-8 items-center font-nav text-sm tracking-wide uppercase">
<a class="text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors duration-300" href="#">Shop</a>
<a class="text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors duration-300" href="#">Philosophy</a>
<a class="text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors duration-300" href="#">Community</a>
<a class="text-stone-600 dark:text-stone-400 hover:text-stone-900 dark:hover:text-stone-100 transition-colors duration-300" href="#">Journal</a>
</div>
<div class="flex items-center gap-5">
<button class="text-stone-800 dark:text-stone-200 flex items-center">
<span class="material-symbols-outlined text-[22px]" data-icon="shopping_bag">shopping_bag</span>
</button>
<button class="text-stone-800 dark:text-stone-200 flex items-center">
<span class="material-symbols-outlined text-[22px]" data-icon="person">person</span>
</button>
</div>
</div>
</nav>
<!-- Main Content: Upcoming Collections -->
<main class="flex-grow flex items-center justify-center relative py-32 px-4 sm:px-6 lg:px-8 bg-surface min-h-[819px] overflow-hidden">
<!-- Abstract Background Shapes -->
<div class="absolute top-0 left-0 w-full h-full overflow-hidden pointer-events-none z-0">
<!-- Top Right Shape -->
<div class="absolute -top-24 -right-24 w-96 h-96 bg-primary/10 rounded-full blur-3xl opacity-60 mix-blend-multiply"></div>
<!-- Bottom Left Shape -->
<div class="absolute -bottom-32 -left-32 w-[500px] h-[500px] bg-[#B47A65]/10 rounded-full blur-3xl opacity-50 mix-blend-multiply"></div>
</div>
<!-- Form Wrapper -->
<div class="relative z-10 w-full max-w-[500px] mx-auto text-center flex flex-col gap-8" id="collection-form-container">
<div class="space-y-4">
<h1 class="text-4xl md:text-[40px] font-semibold tracking-tight text-text-dark" style="font-family: 'Fraunces', serif;">
                    The Soft Clay Capsule
                </h1>
<p class="text-base text-text-dark font-normal">
                    Sign up for early access to our upcoming seasonal drops. Designed for the spaces between.
                </p>
</div>
<!-- Interactive Form Area -->
<div class="mt-4 relative h-16 flex items-center justify-center">
<!-- The Input Group -->
<div class="input-group w-full max-w-[400px] flex items-center relative">
<input aria-label="Email address for early access" class="input-underline w-full bg-transparent border-0 border-b border-muted text-text-dark placeholder:text-muted focus:ring-0 px-0 py-3 text-base font-normal leading-normal transition-all" placeholder="Enter your email" type="email"/>
<button aria-label="Submit email" class="submit-btn absolute right-0 bottom-3 text-primary hover:text-text-dark transition-colors cursor-pointer bg-transparent border-none p-0 flex items-center justify-center" onclick="document.getElementById('collection-form-container').classList.add('form-submitted')" type="button">
<span class="material-symbols-outlined text-2xl font-light" data-icon="arrow_forward">arrow_forward</span>
</button>
</div>
<!-- Success Message (Hidden by default, shown via CSS class on parent) -->
<div class="success-message text-[24px] text-text-dark font-medium" style="font-family: 'Fraunces', serif;">
                    You're on the list.
                </div>
</div>
</div>
</main>
<!-- Footer -->
<footer class="bg-surface border-t border-muted/10 w-full">
<div class="max-w-[960px] mx-auto flex flex-col gap-6 px-5 py-10 text-center @container">
<div class="flex flex-wrap items-center justify-center gap-6 @[480px]:flex-row @[480px]:justify-around">
<a class="text-muted text-base font-normal leading-normal min-w-40 hover:text-text-dark transition-colors" href="#">Shop</a>
<a class="text-muted text-base font-normal leading-normal min-w-40 hover:text-text-dark transition-colors" href="#">Story</a>
<a class="text-muted text-base font-normal leading-normal min-w-40 hover:text-text-dark transition-colors" href="#">Collections</a>
</div>
<p class="text-muted text-base font-normal leading-normal">© Fitsand</p>
</div>
</footer>
</body></html>
